name: Budgetella

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

options:
  bundleIdPrefix: com.ozankilic
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

configFiles:
  Debug: Budgetella/Configuration/Secrets.xcconfig
  Release: Budgetella/Configuration/Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "15"
    DEVELOPMENT_TEAM: ZS9KW29SGF
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  Budgetella:
    type: application
    platform: iOS
    info:
      path: Budgetella/Info.plist
      properties:
        CFBundleDisplayName: Budgetella
        GIDClientID: "523687846942-uqecfl8c1qhih6thai55uubuqkqsba0n.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleURLName: "GoogleSignIn"
            CFBundleURLSchemes:
              - "com.googleusercontent.apps.523687846942-uqecfl8c1qhih6thai55uubuqkqsba0n"
          - CFBundleURLName: "Budgetella"
            CFBundleURLSchemes:
              - "budgetella"
        NSCameraUsageDescription: "Used to scan receipts and automatically create expense entries."
        NSMicrophoneUsageDescription: "Used for voice entry — say an amount and Budgetella logs it instantly."
        NSSpeechRecognitionUsageDescription: "Used to convert your voice into transaction entries."
        NSFaceIDUsageDescription: "Protects your account with Face ID for fast, secure access."
        NSPhotoLibraryUsageDescription: "Used to select receipt photos from your library."
        NSSiriUsageDescription: "Budgetella uses Siri so you can add transactions with your voice."
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: LaunchBackground
        GEMINI_API_KEY: "$(GEMINI_API_KEY)"
    sources:
      - path: Budgetella
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ozankilic.budgetella
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ENABLE_PREVIEWS: YES
      configs:
        Release:
          UPLOAD_SYMBOLS: NO
    entitlements:
      path: Budgetella/Budgetella.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.ozankilic.budgetella
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - target: BudgetellaWidgetExtension
        embed: true

  BudgetellaWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BudgetellaWidgetExtension
        excludes:
          - "**/.DS_Store"
    info:
      path: BudgetellaWidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: "Budgetella Widget"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ozankilic.budgetella.widget
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SKIP_INSTALL: YES
    entitlements:
      path: BudgetellaWidgetExtension/BudgetellaWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ozankilic.budgetella

  BudgetellaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BudgetellaTests
    dependencies:
      - target: Budgetella

  BudgetellaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BudgetellaUITests
    dependencies:
      - target: Budgetella

schemes:
  Budgetella:
    build:
      targets:
        Budgetella: all
    test:
      config: Debug
      targets:
        - BudgetellaTests
        - BudgetellaUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
