name: Budgetella

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

options:
  bundleIdPrefix: com.toprakkilic
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: tr
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # Apple Developer Team ID — Ozzy lokalde dolduracak (xcconfig'e taşınabilir)
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Budgetella
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UIRequiresFullScreen: YES
    # Secrets.xcconfig'ten gelen key'ler Info.plist'e aktarılır
    # (xcconfig dosyası gitignore'da; Ozzy lokalde dolduracak)
    GEMINI_API_KEY: $(GEMINI_API_KEY)
    INFOPLIST_KEY_NSCameraUsageDescription: "Fişlerinizi kameranızla tarayıp otomatik olarak işlem oluşturmamız için kamera erişimine ihtiyacımız var."
    INFOPLIST_KEY_NSFaceIDUsageDescription: "Hesabınızı Face ID ile koruyup hızlı ve güvenli giriş sağlamak için."
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Galeri'den fiş fotoğrafı seçip işlem oluşturmak için."
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  Budgetella:
    type: application
    platform: iOS
    sources:
      - path: Budgetella
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toprakkilic.budgetella
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only V1; iPad sonra (V1.1)
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn

  BudgetellaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BudgetellaTests
    dependencies:
      - target: Budgetella

  BudgetellaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BudgetellaUITests
    dependencies:
      - target: Budgetella

schemes:
  Budgetella:
    build:
      targets:
        Budgetella: all
    test:
      config: Debug
      targets:
        - BudgetellaTests
        - BudgetellaUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
